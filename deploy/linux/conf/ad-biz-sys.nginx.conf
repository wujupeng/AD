server {
    listen 80;
    server_name __SERVER_IP__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name __SERVER_IP__;

    ssl_certificate     __DEPLOY_BASE_DIR__/certs/nginx.crt;
    ssl_certificate_key __DEPLOY_BASE_DIR__/certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root __DEPLOY_BASE_DIR__/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/api/health;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/ad-biz-sys-access.log;
    error_log  /var/log/nginx/ad-biz-sys-error.log;
}