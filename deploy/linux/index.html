<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AD Biz Sys</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; }
.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-card { background: #fff; border-radius: 8px; padding: 40px; width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.login-card h2 { text-align: center; margin-bottom: 24px; color: #1890ff; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 4px; font-size: 14px; color: #333; }
.form-group input { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
.form-group input:focus { border-color: #1890ff; outline: none; }
.btn { width: 100%; padding: 10px; background: #1890ff; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
.btn:hover { background: #40a9ff; }
.error { color: #ff4d4f; font-size: 14px; margin-top: 8px; text-align: center; display: none; }
.result { margin-top: 16px; padding: 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 4px; font-size: 13px; display: none; word-break: break-all; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <h2>AD Biz Sys</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" value="zhangwei">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" value="UserP@ss2026!">
    </div>
    <button class="btn" onclick="login()">Login</button>
    <div class="error" id="error"></div>
    <div class="result" id="result"></div>
  </div>
</div>
<script>
async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  const resultEl = document.getElementById('result');
  errorEl.style.display = 'none';
  resultEl.style.display = 'none';
  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (data.code === 0 && data.data && data.data.access_token) {
      resultEl.style.display = 'block';
      resultEl.style.background = '#f6ffed';
      resultEl.style.borderColor = '#b7eb8f';
      resultEl.textContent = 'Login SUCCESS! Token: ' + data.data.access_token.substring(0, 50) + '...';
    } else {
      errorEl.style.display = 'block';
      errorEl.textContent = data.message || 'Login failed';
    }
  } catch(e) {
    errorEl.style.display = 'block';
    errorEl.textContent = 'Network error: ' + e.message;
  }
}
</script>
</body>
</html>
